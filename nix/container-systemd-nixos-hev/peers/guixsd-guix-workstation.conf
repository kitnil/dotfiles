protocol bgp guixsd_guix_workstation {
    local as OWNAS;
    ipv4 {
        next hop self;
        import none;
        export filter {
            if (net = 0.0.0.0/0) then {
                bgp_community.add((OWNAS,0));
                accept;
            }
            reject;
        };
    };
    neighbor 192.168.0.191 as 64994;
    multihop;
}
