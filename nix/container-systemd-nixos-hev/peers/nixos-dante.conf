protocol bgp nixosdante {
    local as OWNAS;
    ipv4 {
        next hop self;
        import filter {
            if (64983,0) ~ bgp_community then accept;
            if (64981,100) ~ bgp_community then accept;
            reject;
        };
        export none;
    };
    neighbor 192.168.0.110 as 64983;
    multihop;
}
