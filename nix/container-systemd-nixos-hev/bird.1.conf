log "/var/log/bird.log" all;

define OWNAS = 64982;
define OWNIP = 192.168.0.115;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

router id OWNIP;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) && (net = 192.168.0.110/32) then accept;
            if (64983,0) ~ bgp_community then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;
    route 192.168.0.110/32 via "eth0";
}

include "/etc/bird/peers/*.conf";

