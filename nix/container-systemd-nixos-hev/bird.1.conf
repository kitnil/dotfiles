log syslog all;

define OWNAS = 64982;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) then accept;
            if (source = RTS_BGP) then {
                if (64983,0) ~ bgp_community then accept;
                if (64981,100) ~ bgp_community then accept;
                if (64981,101) ~ bgp_community then accept;
            }
            reject;
        };
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";
}

include "/etc/bird/peers/*.conf";
