log syslog all;

define OWNAS = 64979;

protocol device {
}

protocol kernel {
    learn;
    ipv4 {
        import filter {
            if net ~ [192.168.0.0/24+] then reject;
            if net ~ [192.168.0.0/16+, 172.16.0.0/12+, 78.108.80.0/24+, 78.108.87.0/24+, 78.108.88.0/23+, 178.208.86.0/24+, 178.250.246.0/23+, 185.10.184.0/22+] then accept;
            reject;
        };
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";

    route 10.0.0.0/8 blackhole;
    route 172.16.0.0/12 blackhole;
    route 192.168.0.0/16 blackhole;

    route 78.108.87.250/32 via 192.168.0.1;
    # upstream dns
    route 172.16.102.35/32 via recursive 172.16.103.1;
    route 172.16.103.131/32 via recursive 172.16.103.1;
    route 172.16.103.2/32 via recursive 172.16.103.1;
    route 78.108.80.1/32 via recursive 172.16.103.1;
    route 78.108.88.1/32 via recursive 172.16.103.1;
}

include "/etc/bird/peers/*.conf";

