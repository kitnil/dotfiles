log syslog all;

define OWNAS = 64979;

protocol device {
}

protocol kernel {
    learn;
    ipv4 {
        import filter {
            if net ~ [192.168.0.0/24+] then reject;
            if net ~ [192.168.0.0/16+, 172.16.0.0/20+, 78.108.80.0/24+, 78.108.88.0/23, 178.208.86.0/24, 178.250.246.0/23, 185.10.184.0/22] then accept;
            reject;
        };
        export filter {
            if (source = RTS_STATIC) && (net = 192.168.0.115/32) then accept;
            if (source = RTS_STATIC) && (net ~ [192.168.0.110/32]) then accept;
            if (64982,0) ~ bgp_community then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;
    # upstream
    route 192.168.0.115/32 via "eth0";

    # downstreams
    route 192.168.0.110/32 via "eth0";
}

include "/etc/bird/peers/*.conf";

