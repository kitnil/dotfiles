log "/var/log/bird.log" all;

define OWNAS = 64995;
define OWNIP = 192.168.0.190;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

router id OWNIP;

protocol device {
    scan time 10;
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export filter { if (net = 0.0.0.0/0) then accept; reject; };
    };
}

protocol static {
    route OWNNET reject;

    ipv4 {
        import all;
        export all;
    };
}

protocol static {
    ipv4;

    route 0.0.0.0/0 via 192.168.0.192;

    # habr.com
    route 178.248.237.68/32 via "eth0";

    # cdn.7tv.app
    route 37.27.0.0/16 via "eth0";

    # substitutes.nonguix.org
    route 144.76.7.123/32 via "eth0";
}

include "/etc/bird/peers/*.conf";

