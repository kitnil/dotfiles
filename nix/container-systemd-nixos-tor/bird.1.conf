log syslog all;

debug protocols all;
debug channels all;
debug tables all;

define OWNAS = 64995;

router id 192.168.0.190;

protocol device {
    scan time 10;
}

protocol kernel {
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.180/32 via "eth0";

    # habr.com
    route 178.248.237.68/32 via "eth0";

    # cdn.7tv.app
    route 37.27.0.0/16 via "eth0";

    # substitutes.nonguix.org
    route 144.76.7.123/32 via "eth0";
}

ipv4 table upstream_routes;

protocol pipe {
    table upstream_routes;
    peer table master4;
    export filter { if (0,0) ~ bgp_community then accept; reject; };
    import none;
};

include "/etc/bird/peers/*.conf";

