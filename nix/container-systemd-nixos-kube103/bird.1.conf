log syslog all;

define OWNAS = 64978;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) && (net = 192.168.0.1/32) then accept;
            if (source = RTS_STATIC) && (net = 192.168.0.0/24) then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;

    # upstream
    route 192.168.0.1/32 via "eth0";

    # downstream
    route 192.168.0.0/24 via "eth0";
}
