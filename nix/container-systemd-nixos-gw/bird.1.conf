log "/var/log/bird.log" all;

define OWNAS = 64992;
define OWNIP = 192.168.0.170;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

router id OWNIP;

protocol device {
    scan time 10;
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export filter { if (net = 0.0.0.0/0) then accept; reject; };
    };
}

protocol static {
    ipv4;
    # https://antifilter.network/
    route 45.148.244.55/32 via "eth0";
}

include "/etc/bird/peers/*.conf";
