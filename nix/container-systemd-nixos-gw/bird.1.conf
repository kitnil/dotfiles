log syslog all;

define OWNAS = 64992;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) && (net = 192.168.0.180/32) then accept;
            if (64992,0) ~ bgp_community then accept;
            reject;
       };
    };
}

protocol static {
    ipv4;
    route 192.168.0.180/32 via "eth0";

    # https://antifilter.network/
    route 45.148.244.55/32 via "eth0";
}

include "/etc/bird/peers/*.conf";
