log syslog all;

define OWNAS = 64998;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) then accept;
            if (64982,0) ~ bgp_community then accept;
            reject;
        };
    };
}

protocol kernel {
    ipv6 {
        import none;
        export filter {
            if (source = RTS_STATIC) then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";

    route 10.0.0.0/8 blackhole;
    route 172.16.0.0/12 blackhole;
    route 192.168.0.0/16 blackhole;
}

protocol static {
    ipv6;
    route fc00::/7 blackhole;
}

include "/etc/bird/peers/*";
