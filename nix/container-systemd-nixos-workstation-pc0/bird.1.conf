log "/var/log/bird.log" all;

################################################
#               Variable header                #
################################################

define OWNAS = 64998;
define OWNIP = 192.168.0.195;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

################################################
#                 Header end                   #
################################################

router id OWNIP;

protocol device {
    scan time 10;
}

/*
 *  Utility functions
 */

protocol kernel {
    scan time 20;

    ipv4 {
        import all;
        export all;
    };
}

protocol static {
    route OWNNET reject;

    ipv4 {
        import all;
        export all;
    };
}

protocol static {
ipv4;
}

include "/etc/bird/peers/*";
