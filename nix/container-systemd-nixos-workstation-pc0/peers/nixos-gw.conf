protocol bgp nixosgw {
    local as OWNAS;
    ipv4 {
       next hop self;
       export none;
       import filter {
           bgp_path.prepend(OWNAS);
           # cdn.betterttv.net
           # socialstream.ninja
           # discord.com
           if (64993,1001) ~ bgp_community || (65444,100) ~ bgp_community || (65444,800) ~ bgp_community
           then
               bgp_path.prepend(OWNAS);
           accept;
       };
    };
    neighbor 192.168.0.170 as 64992;
}
