log syslog all;

define OWNAS = 64997;

protocol device {
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) && (net = 192.168.0.180/32) then accept;
            if (source = RTS_STATIC) && (net = 192.168.0.110/32) then accept;
            if (source = RTS_STATIC) && (net = 192.168.0.144/32) then accept;
            if (64993,0) ~ bgp_community then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;

    # upstream
    route 192.168.0.180/32 via "eth0";

    # downstream
    route 192.168.0.110/32 via "eth0";

    # monitoring
    route 192.168.0.144/32 via "eth0";

    route 144.208.192.0/18 via 192.168.0.175;
    route 87.245.216.0/21 via 192.168.0.175;
    route 74.125.0.0/16 via 192.168.0.175;
}

include "/etc/bird/peers/*.conf";
