log "/var/log/bird.log" all;

define OWNAS = 64997;
define OWNIP = 192.168.0.175;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

router id OWNIP;

protocol device {
    scan time 10;
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export filter { if (net = 0.0.0.0/0) then accept; reject; };
    };
}

protocol static {
    ipv4;
    route 144.208.192.0/18 via 192.168.0.175;
    route 87.245.216.0/21 via 192.168.0.175;
    route 74.125.0.0/16 via 192.168.0.175;
}

include "/etc/bird/peers/*.conf";
