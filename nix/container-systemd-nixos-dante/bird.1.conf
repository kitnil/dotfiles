log syslog all;

define OWNAS = 64983;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) && (net = 192.168.0.170/32) then accept;
            if (source = RTS_STATIC) && (net ~ [192.168.0.130/32, 192.168.0.115/32, 192.168.0.190/32, 192.168.0.175/32, 192.168.0.192/32, 192.168.0.144/32]) then accept;
            if (64993,0) ~ bgp_community then accept;
            if (source = RTS_BGP) then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;
    # upstream
    route 192.168.0.170/32 via "eth0";

    # downstreams
    route 192.168.0.130/32 via "eth0";
    route 192.168.0.115/32 via "eth0";
    route 192.168.0.190/32 via "eth0";
    route 192.168.0.175/32 via "eth0";
    route 192.168.0.192/32 via "eth0";
    route 192.168.0.144/32 via "eth0";
}

include "/etc/bird/peers/*.conf";

