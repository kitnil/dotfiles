log syslog all;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";
    route 0.0.0.0/0 recursive 192.168.0.1;

    route 10.0.0.0/8 blackhole;
    route 172.16.0.0/12 blackhole;
    route 192.168.0.0/16 blackhole;
}
