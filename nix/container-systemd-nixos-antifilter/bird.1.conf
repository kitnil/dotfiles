log syslog all;

define OWNAS = 64993;

protocol device {
}

protocol kernel {
    metric 0;
    ipv4 {
        import none;
        export filter {
            if (source = RTS_STATIC) then accept;
            reject;
        };
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";
    route 0.0.0.0/0 recursive 192.168.0.1;

    route 10.0.0.0/8 blackhole;
    route 172.16.0.0/12 blackhole;
    route 192.168.0.0/16 blackhole;
}

ipv4 table upstream_routes;
ipv4 table downstream_routes;

protocol static {
    ipv4 {
        table upstream_routes;
    };
    route 192.168.0.1/32 via "eth0";
}

protocol pipe {
    table master4;
    peer table downstream_routes;
    export filter {
        if (net = 0.0.0.0/0) then {
            bgp_community.add((OWNAS,0));
            accept;
        }
        reject;
    };
    import none;
};

protocol pipe {
    table downstream_routes;
    peer table upstream_routes;
    export filter {
        # cloudflare
        if (bgp_path.last = 13335) then {
            bgp_community.add((OWNAS,13335));
            accept;
        }
        reject;
    };
    import none;
};

include "/etc/bird/peers/*.conf";
