log syslog all;

define OWNAS = 64993;

protocol device {
}

protocol kernel {
    metric 0;
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";
    route 0.0.0.0/0 recursive 192.168.0.1;
}

ipv4 table downstream_routes;

protocol pipe {
    table master4;
    peer table downstream_routes;
    export filter {
        if (net = 0.0.0.0/0) then {
            bgp_community.add((OWNAS,0));
            accept;
        }
        reject;
    };
    import none;
};

include "/etc/bird/peers/*.conf";
