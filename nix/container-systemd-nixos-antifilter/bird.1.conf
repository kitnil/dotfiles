log "/var/log/bird.log" all;

define OWNAS = 64993;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.1/32 via "eth0";
    route 0.0.0.0/0 via 192.168.0.1;
}

ipv4 table downstream_routes;

include "/etc/bird/peers/*.conf";
