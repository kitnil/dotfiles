log "/var/log/bird.log" all;

define OWNAS = 64990;
define OWNIP = 192.168.0.160;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

router id OWNIP;

protocol device {
    scan time 10;
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export filter { if (net = 0.0.0.0/0) then accept; reject; };
    };
}

protocol static {
    ipv4;
    route 192.168.0.1/32 via "eth0";
    route 0.0.0.0/0 via 192.168.0.1;
}

include "/etc/bird/peers/*.conf";
