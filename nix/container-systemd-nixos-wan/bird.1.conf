log "/var/log/bird.log" all;

define OWNAS = 64990;
define OWNIP = 192.168.0.160;

router id OWNIP;

protocol device {
}

protocol kernel {
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.1/32 via "eth0";
    route 0.0.0.0/0 recursive 192.168.0.1;
}

include "/etc/bird/peers/*.conf";
