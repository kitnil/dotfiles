apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-reconfigure
spec:
  template:
    metadata:
      annotations:
        guix-default-channel-commit: 8c0fc60e
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: refresh
        env:
        - name: GIT_COMMIT
          value: 4133d5518eed520ef037a8b77addf355d5bf18e9
        - name: GUIX_SYSTEM
          value: guixsd
