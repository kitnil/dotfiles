apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 755a865020ab4c2e305dd578dab0da227d8df0f9
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
