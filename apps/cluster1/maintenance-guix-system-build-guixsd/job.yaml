apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 96bb89d99bee185f5f1058fddfacee6b0c15bba7
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
