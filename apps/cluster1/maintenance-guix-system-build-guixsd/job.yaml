apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 2b1fbbd99c7cfeda88982609b7be2b475c04d942
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
