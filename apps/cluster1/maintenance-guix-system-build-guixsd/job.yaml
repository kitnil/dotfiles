apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: f1fd582b8b55c577380375f8ffbd89fae8f57706
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
