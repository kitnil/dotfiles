apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 8cba933698e29b21d4548cf137faceb2f1ad121a
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
