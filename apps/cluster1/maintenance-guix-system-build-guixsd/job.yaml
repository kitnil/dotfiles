apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: d46eb89f0e363082f1c5cd3142395368fd4905f8
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
