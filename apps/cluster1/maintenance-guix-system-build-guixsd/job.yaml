apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: b7515f408142370f0094b931df2b8d4e06a97bc1
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
