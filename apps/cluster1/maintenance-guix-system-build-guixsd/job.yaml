apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 0a523baf381a079fb05a295eb13df0a64020ca5c
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
