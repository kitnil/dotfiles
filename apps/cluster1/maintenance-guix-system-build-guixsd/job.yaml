apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: e2295ad6888cac868a0ff1fa05415e669a450339
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
