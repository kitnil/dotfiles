apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 0dfe58d04cd9b809e15fa542a69cabf77df3cc05
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
