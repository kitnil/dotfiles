apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 651f9308a0849d524406b99e5465fbf34c11dc12
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
