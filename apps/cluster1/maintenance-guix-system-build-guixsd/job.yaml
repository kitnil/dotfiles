apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 8999747bbe9864c85beafc2e2cfef6ce15de6f3b
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
