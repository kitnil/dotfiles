apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 48741fd664bd15d6c13379d83e55f895cde94ecb
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
