apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 7a664edd3169ec6247b45a03e29a859562e77683
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
