apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: f0dfa070e3e62bb22990a33e4cfeda56c6aae644
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
