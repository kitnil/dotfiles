apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 98086259c3b4e9e656cf87026ca1944b561b8eea
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
