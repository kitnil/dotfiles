apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 57158bb75732b368e4cbcd31ba2099b0b38c3d90
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
