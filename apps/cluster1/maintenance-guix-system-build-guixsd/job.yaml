apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: e0ab85da88cae78300e0ec7176a26d37e908cde2
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
