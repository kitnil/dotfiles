apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 34c8032d15acf092d1d45ba5adc75a5e6a584796
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
