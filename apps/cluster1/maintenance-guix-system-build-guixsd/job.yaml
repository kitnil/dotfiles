apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 7675892f9de40b3768d9c294577996841965f174
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
