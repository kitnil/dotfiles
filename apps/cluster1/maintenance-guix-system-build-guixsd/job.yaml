apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 07cf994db4af4254b8690babd16ccf89257612dd
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
