apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 3bf9ce43d8f27806eb01a765c271e4c606d1860c
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
