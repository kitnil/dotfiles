apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: a514f91698d2a45868e182f50fdfedd94267a7fb
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
