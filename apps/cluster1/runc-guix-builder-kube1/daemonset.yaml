apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: runc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: runc-kube1-guix-builder
      app.kubernetes.io/part-of: guix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runc-kube1-guix-builder
        app.kubernetes.io/part-of: guix
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: runc
        env:
        - name: RUNC_BUNDLE
          value: /srv/runc/guix-builder
        - name: RUNC_CONTAINER_ID
          value: guix-builder
        ports:
        - containerPort: 5556
          name: guix
          protocol: TCP
        - containerPort: 22
          name: ssh
          protocol: TCP
        volumeMounts:
        - mountPath: /srv/runc/guix-builder
          name: runc-guix-builder
      volumes:
      - name: runc-guix-builder
        hostPath:
          path: /srv/runc/guix-builder
          type: Directory
