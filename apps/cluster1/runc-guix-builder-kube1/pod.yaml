apiVersion: v1
kind: Pod
metadata:
  name: runc
spec:
  nodeSelector:
    kubernetes.io/hostname: kube1
  containers:
  - name: runc
    command:
    - /gnu/store/3dwzy5gwagj0g838gr4kg77a0s0v1q0s-runc-1.1.12/sbin/runc
    - run
    - --bundle
    - /srv/runc/guix-builder
    - guix-builder
    volumeMounts:
    - mountPath: /srv/runc/guix-builder
      name: runc-guix-builder
    - mountPath: /var/run/netns/runc
      name: var-run-netns-runc
  hostNetwork: true
  volumes:
  - name: runc-guix-builder
    hostPath:
      path: /srv/runc/guix-builder
      type: Directory
  - name: var-run-netns-runc
    hostPath:
      path: /var/run/netns/runc
      type: Directory
