apiVersion: v1
kind: Pod
metadata:
  name: runc
  annotations:
    # Setting spec.force to true will make Flux recreate the Pod when any
    # immutable field is changed, forcing the Pod to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
  - image: harbor.home.wugi.info/library/runc:a3dcef4d
    name: runc
    securityContext:
      priveleged: true
      readOnlyRootFilesystem: true
    volumeMounts:
    - mountPath: /run/runc
      name: run-runc
  hostNetwork: true
  volumes:
  - name: run-runc
    emptyDir:
      medium: Memory
      sizeLimit: 128M
