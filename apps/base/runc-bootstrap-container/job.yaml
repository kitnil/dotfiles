apiVersion: batch/v1
kind: Job
metadata:
  name: runc-bootstrap-container
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          nsenter --target "1" --mount --uts --ipc --net --pid --no-fork \
          /run/setuid-programs/sudo --login bash <<'EOF'
          set -o nounset -o errexit -o pipefail -o xtrace
          if [[ -e "$RUNC_BOOTSTRAP_CONTAINER_DIRECTORY" ]]
          then
              echo "runc '${RUNC_BOOTSTRAP_CONTAINER_DIRECTORY}' container directory already exists, exiting."
              exit 0
          fi
          mkdir -p "$RUNC_BOOTSTRAP_CONTAINER_DIRECTORY"
          cd "$RUNC_BOOTSTRAP_CONTAINER_DIRECTORY" || exit 1
          skopeo copy "docker://${RUNC_BOOTSTRAP_CONTAINER_IMAGE}" "oci:${RUNC_BOOTSTRAP_CONTAINER_IMAGE}"
          umoci raw unpack --image "${RUNC_BOOTSTRAP_CONTAINER_IMAGE}" rootfs
          umoci raw runtime-config --image "${RUNC_BOOTSTRAP_CONTAINER_IMAGE}" --rootfs rootfs config.json
          EOF
        image: harbor.home.wugi.info/library/skopeo-umoci:96ab01a9
        name: bootstrap
        resources:
          limits:
            cpu: 14000m
            memory: 4096Mi
          requests:
            cpu: 1000m
            memory: 512Mi
        securityContext:
          privileged: true
