apiVersion: batch/v1
kind: CronJob
metadata:
  name: mbsync
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          hostNetwork: true
          hostPID: true
          restartPolicy: Never
          containers:
          - command:
            - nsenter
            - --target
            - "1"
            - --mount
            - --uts
            - --ipc
            - --net
            - --pid
            - --no-fork
            - /bin/sh
            - -l
            - -c
            - exec sudo --user oleg --login mbsync "$MBSYNC_IMAP_ACCOUNT"
            image: docker-registry.wugi.info/library/util-linux-with-udev
            name: mbsync
            resources:
              limits:
                cpu: 14000m
                memory: 4096Mi
              requests:
                cpu: 1000m
                memory: 512Mi
            securityContext:
              privileged: true
