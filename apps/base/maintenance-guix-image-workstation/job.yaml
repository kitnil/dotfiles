apiVersion: batch/v1
kind: Job
metadata:
  name: guix-image-workstation
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          nsenter --target "1" --mount --uts --ipc --net --pid --no-fork \
          /run/setuid-programs/sudo --user oleg --login bash <<END_SUDO
          kubectl --namespace=guix exec --stdin=true pod/runc-kube1-guix-builder -- runc exec -u 1000:998 guix-builder /bin/sh -l <<END_KUBECTL
          guix shell git gnupg skopeo --development guix -- /bin/sh -l <<END_GUIX_SHELL
          set -o nounset -o errexit -o pipefail -o xtrace
          mkdir -p \${HOME}/.cache/wigust/checkouts
          TMPDIR=\${HOME}/.cache/wigust/checkouts mktemp -d -t "dotfiles.XXXXXXXXXX"
          cd \$TMPDIR || exit 1
          git init
          git remote add origin https://cgit.wugi.info/git/wigust/dotfiles
          git fetch --depth 1 origin $GIT_COMMIT
          git checkout $GIT_COMMIT
          make guix-image-workstation
          END_GUIX_SHELL
          END_KUBECTL
          END_SUDO
        image: docker-registry.wugi.info/library/util-linux-with-udev
        name: nsenter
        resources:
          limits:
            cpu: 14000m
            memory: 8192Mi
          requests:
            cpu: 50m
            memory: 8192Mi
        securityContext:
          privileged: true
