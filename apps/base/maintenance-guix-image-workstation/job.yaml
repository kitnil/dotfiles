apiVersion: batch/v1
kind: Job
metadata:
  name: guix-image-workstation
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      containers:
      - command:
        - /bin/guile
        - /usr/local/bin/guile-script.scm
        image: harbor.home.wugi.info/library/util-linux-with-udev:44cd2b5c
        name: nsenter
        resources:
          limits:
            cpu: 14000m
            memory: 8192Mi
          requests:
            cpu: 50m
            memory: 8192Mi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /usr/local/bin
          name: script
      volumes:
      - name: script
        configMap:
          name: script
