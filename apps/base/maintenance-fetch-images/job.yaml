apiVersion: batch/v1
kind: Job
metadata:
  name: fetch-images
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      containers:
      - command:
        - nsenter
        - --target
        - "1"
        - --mount
        - --uts
        - --ipc
        - --net
        - --pid
        - --no-fork
        - /bin/sh
        - -l
        - -c
        - |
          set -o errexit -o pipefail
          fetch_images()
          {
              guix shell yq -- yq --output-format json . "$FETCH_IMAGES_KUSTOMIZATION_FILE" | guix shell jq -- jq --raw-output '.images[] | [.name, .newTag] | join(":")'
          }
          export -f fetch_images
          mapfile -t container_images < <(sudo --user oleg --login "$(sudo --user oleg --login fetch_images)")
          for container_image in "${container_images[@]}"
          do
              nerdctl -n k8s.io pull "$container_image"
          done
        image: docker-registry.wugi.info/library/util-linux-with-udev
        name: fetch
        resources:
          limits:
            cpu: 14000m
            memory: 4096Mi
          requests:
            cpu: 1000m
            memory: 512Mi
        securityContext:
          privileged: true
