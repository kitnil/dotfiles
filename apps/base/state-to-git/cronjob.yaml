apiVersion: batch/v1
kind: CronJob
metadata:
  name: state-to-git
spec:
  suspend: true
  schedule: "0 0 * * *" # every day
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: state-to-git
            app.kubernetes.io/part-of: state-to-git
        spec:
          hostNetwork: true
          hostPID: true
          restartPolicy: Never
          containers:
          - name: state-to-git
            image: docker-registry.wugi.info/library/util-linux-with-udev
            command:
            - /bin/sh
            - -l
            - -c
            - |
              nsenter --target "1" --mount --uts --ipc --net --pid --no-fork \
              /run/setuid-programs/sudo --user oleg --login bash <<'EOF'
              set -o nounset -o errexit -o pipefail -o xtrace
              kubectl --namespace=workstation exec --container=guix --stdin=true pod/workstation-kube1 -- /bin/sh -le <<'EOL'
              set -o nounset -o errexit -o pipefail -o xtrace
              cd "${HOME}/src/gitlab.intr/monitoring/state" || exit 1
              echo "Waiting to gitlab.intr:80 be available."
              until nc -z gitlab.intr 80
              do
                  sleep 60
              done
              git pull --rebase origin master
              EOL
              EOF
            resources:
              limits:
                cpu: 2000m
                memory: 1024Mi
              requests:
                cpu: 50m
                memory: 64Mi
            securityContext:
              privileged: true
