apiVersion: cilium.io/v2alpha1
kind: CiliumNodeConfig
metadata:
  namespace: kube-system
  name: direct-routing-device-kube3
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: kube3
  defaults:
    devices: "eth0 macvlan0 macvtap7 macvtap8 macvtap9 macvtap10"
    direct-routing-device: "eth0,macvlan0,macvtap7,macvtap8,macvtap9,macvtap10"
    l2-pod-announcements-interface: "eth0"
