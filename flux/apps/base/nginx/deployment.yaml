apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
      app.kubernetes.io/part-of: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: nginx
    spec:
      containers:
      - image: nginx:1.27.5
        name: nginx
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
