apiVersion: batch/v1
kind: CronJob
metadata:
  name: mbsync
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  suspend: false
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      activeDeadlineSeconds: 82800 # 23 hours
      backoffLimit: 0
      template:
        spec:
          hostNetwork: true
          hostPID: true
          restartPolicy: Never
          containers:
          - command:
            - nsenter
            - --target
            - "1"
            - --mount
            - --uts
            - --ipc
            - --net
            - --pid
            - --no-fork
            - --setuid=1000
            - --setgid=998
            - /run/current-system/profile/bin/bash
            - -l
            - -c
            - |
              set -o nounset -o errexit -o pipefail -o xtrace
              /usr/bin/env
              # This lists keys along with their keygrip. Then check if the
              # keygrip exists in the agent cache:
              #     gpg --with-keygrip -k
              # If it appears with a 1, it's unlocked.
              until [[ $(gpg-connect-agent 'keyinfo --list' /bye | awk '/2172063C653BABEFB3FF105A46DE07269E42DE0B/ { print $7 }') == 1 ]]
              do
                  echo "Waiting gpg unlocked."
                  sleep 10
              done
              mbsync "$MBSYNC_IMAP_ACCOUNT"
            image: docker-registry.wugi.info/library/util-linux-with-udev
            name: mbsync
            resources:
              limits:
                cpu: 14000m
                memory: 4096Mi
              requests:
                cpu: 1000m
                memory: 512Mi
            securityContext:
              privileged: true
