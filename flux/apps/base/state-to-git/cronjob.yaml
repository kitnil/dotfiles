apiVersion: batch/v1
kind: CronJob
metadata:
  name: state-to-git
spec:
  schedule: "0 0 * * *" # every day
  jobTemplate:
    spec:
      activeDeadlineSeconds: 82800 # 23 hours
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: state-to-git
            app.kubernetes.io/part-of: state-to-git
        spec:
          hostNetwork: true
          hostPID: true
          restartPolicy: Never
          containers:
          - name: state-to-git
            image: docker-registry.wugi.info/library/util-linux-with-udev
            command:
            - nsenter
            - --target=1
            - --mount
            - --uts
            - --ipc
            - --net
            - --pid
            - --no-fork
            - --setuid=1000
            - --setgid=998
            - /bin/sh
            - -l
            - -c
            - |
              set -o nounset -o errexit -o pipefail -o xtrace
              kubectl --namespace=workstation exec --container=guix --stdin=true pod/workstation-kube1 -- /run/setuid-programs/sudo --user oleg --login /bin/sh -le <<'EOF'
              set -o nounset -o errexit -o pipefail -o xtrace
              cd "${HOME}/src/gitlab.intr/monitoring/state" || exit 1
              until nc -z gitlab.intr 80
              do
                  echo "Waiting to gitlab.intr:80 be available."
                  sleep 60
              done
              git pull --rebase origin master
              EOF
            resources:
              limits:
                cpu: 2000m
                memory: 1024Mi
              requests:
                cpu: 50m
                memory: 64Mi
            securityContext:
              privileged: true
