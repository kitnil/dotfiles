apiVersion: batch/v1
kind: Job
metadata:
  name: runc-bootstrap-container
  annotations:
    # Setting spec.force to true will make Flux recreate the Job when any
    # immutable field is changed, forcing the Job to run every time the
    # container image tag changes.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      restartPolicy: Never
      containers:
      - command:
        - /bin/sh
        - -l
        - -c
        - |
          set -o nounset -o errexit -o pipefail -o xtrace
          if [[ -e "${RUNC_BOOTSTRAP_CONTAINER_DIRECTORY}/rootfs" ]]
          then
              echo "runc '${RUNC_BOOTSTRAP_CONTAINER_DIRECTORY}' container directory already exists, exiting."
              exit 0
          fi
          cd "$RUNC_BOOTSTRAP_CONTAINER_DIRECTORY" || exit 1
          skopeo copy "docker://${RUNC_BOOTSTRAP_CONTAINER_IMAGE}" oci:oci-rootfs:latest
          umoci raw unpack --image oci-rootfs:latest rootfs
          umoci raw runtime-config --image oci-rootfs:latest --rootfs rootfs config.json
        image: harbor.home.wugi.info/library/skopeo-umoci:49152285
        name: bootstrap
        env:
        - name: SSL_CERT_DIR
          value: /etc/ssl/certs
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/ca-certificates.crt
        resources:
          limits:
            cpu: 14000m
            memory: 4096Mi
          requests:
            cpu: 1000m
            memory: 512Mi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /etc/containers/policy.json
          name: skopeo-configuration
          subPath: policy.json
          readOnly: true
      volumes:
      - name: skopeo-configuration
        configMap:
          name: skopeo-configuration
