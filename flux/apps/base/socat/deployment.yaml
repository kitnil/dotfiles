apiVersion: apps/v1
kind: Deployment
metadata:
  name: socat
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: socat
      app.kubernetes.io/part-of: socat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socat
        app.kubernetes.io/part-of: socat
    spec:
      containers:
      - name: socat
        image: nixery.dev/shell/socat
        command:
        - socat
