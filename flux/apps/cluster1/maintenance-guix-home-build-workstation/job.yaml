apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 1e35fdaffa4a799a912bdacabf52afc72733c7a1
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-home-build-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
