apiVersion: batch/v1
kind: Job
metadata:
  name: runc-bootstrap-container-guix
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube3
      tolerations:
      - key: nanokvm.cluster.local
        operator: Equal
        value: 'true'
        effect: NoSchedule
      containers:
      - name: bootstrap
        volumeMounts:
        - mountPath: /srv/runc/guix-nanokvm
          name: runc-bootstrap-container-directory
        env:
        - name: RUNC_BOOTSTRAP_CONTAINER_DIRECTORY
          value: /srv/runc/guix-nanokvm
      volumes:
      - name: runc-bootstrap-container-directory
        hostPath:
          path: /srv/runc/guix-nanokvm
          type: Directory
