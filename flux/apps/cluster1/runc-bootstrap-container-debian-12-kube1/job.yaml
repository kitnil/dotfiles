apiVersion: batch/v1
kind: Job
metadata:
  name: runc-bootstrap-container-debian-12
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: bootstrap
        volumeMounts:
        - mountPath: /srv/runc/debian
          name: runc-bootstrap-container-directory
        env:
        - name: RUNC_BOOTSTRAP_CONTAINER_DIRECTORY
          value: /srv/runc/debian
      volumes:
      - name: runc-bootstrap-container-directory
        hostPath:
          path: /srv/runc/debian
          type: Directory
