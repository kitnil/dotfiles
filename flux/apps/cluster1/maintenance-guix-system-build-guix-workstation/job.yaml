apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 903e50d07c26174ad4d798651dd5be9c02424684
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
