apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 0531d9076d78c32b7ae5fa27ade2f2f2dc027294
        - name: RUNC_MAKE_TARGET
          value: "guix-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
