apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 43e8d3fe2dede3b5db5af9446b94c98d35412af9
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
