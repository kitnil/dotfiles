apiVersion: batch/v1
kind: Job
metadata:
  name: runc-bootstrap-container-fedora-43
  spec:
    template:
      spec:
        nodeSelector:
          kubernetes.io/hostname: kube3
      containers:
      - name: bootstrap
        volumeMounts:
          - mountPath: /srv/runc/fedora
            name: runc-bootstrap-container-directory
        env:
        - name: RUNC_BOOTSTRAP_CONTAINER_DIRECTORY
          value: /srv/runc/fedora
          volumes:
            - name: runc-bootstrap-container-directory
        hostPath:
          path: /srv/runc/fedora
          type: Directory
