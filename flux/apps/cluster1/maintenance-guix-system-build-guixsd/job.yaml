apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 071c845794a456cadfc1f38fbac8092fd821b6bf
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-guixsd"
        - name: RUNC_ENVIRONMENT
          value: guix
