apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 870dcb497fd10abc16aeb4f4e4209db69237ec63
        - name: RUNC_MAKE_TARGET
          value: "guixsd"
