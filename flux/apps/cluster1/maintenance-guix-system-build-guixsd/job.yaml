apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: b54dba22dbb9c95b56796a1a4a9ea07f66a97eac
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-guixsd"
        - name: RUNC_ENVIRONMENT
          value: guix
