apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: dec4ddd7376a06891fc143af2711fefa401770d6
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-guixsd"
        - name: RUNC_ENVIRONMENT
          value: guix
