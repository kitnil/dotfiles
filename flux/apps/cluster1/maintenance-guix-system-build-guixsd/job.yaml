apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: ef4d4ad7019fffce231dfa6698c177fb73a898c5
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-guixsd"
