apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 66af9f20291994baa87eb5062decf409c264745e
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-guixsd"
        - name: RUNC_ENVIRONMENT
          value: guix
