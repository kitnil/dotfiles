apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 8166403ab4a478a264bc749d5ba36c5a20a0aa1b
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-guixsd"
