apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: fd4ee0bb2b134f3ac3eb09a461dc40ca4f38de9c
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-notebook"
        - name: RUNC_ENVIRONMENT
          value: guix
