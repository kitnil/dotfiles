apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: fcbe4840b1700adcc6c1436d061612ad3291fa16
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-notebook"
        - name: RUNC_ENVIRONMENT
          value: guix
