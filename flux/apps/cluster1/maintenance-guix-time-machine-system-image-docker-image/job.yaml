apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: bcb5624eb4491f0bd91409a6be0b387106c565d0
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-image-docker-image"
        - name: RUNC_ENVIRONMENT
          value: guix
