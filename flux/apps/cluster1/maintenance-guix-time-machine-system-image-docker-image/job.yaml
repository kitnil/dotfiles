apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 64ca9450f464e94ab7b10352483f2ade76dfbf47
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-image-docker-image"
        - name: RUNC_ENVIRONMENT
          value: guix
