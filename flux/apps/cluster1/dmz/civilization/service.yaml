apiVersion: v1
kind: Service
metadata:
  name: civilization-tcp
  annotations:
    metallb.universe.tf/allow-shared-ip: key-to-share-dmz
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.178
  ports:
  - name: civilization-0
    protocol: TCP
    port: 2344
    targetPort: 2344
  - name: civilization-1
    protocol: TCP
    port: 2345
    targetPort: 2345
---
apiVersion: v1
kind: Service
metadata:
  name: civilization-udp
  annotations:
    metallb.universe.tf/allow-shared-ip: key-to-share-dmz
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.178
  ports:
  - name: civilization-0
    protocol: TCP
    port: 2344
    targetPort: 2344
  - name: civilization-1
    protocol: TCP
    port: 2345
    targetPort: 2345
