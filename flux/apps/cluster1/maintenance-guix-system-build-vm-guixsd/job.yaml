apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 7a0f6b0ee87978bb562e6de0c69b9025bbcfd8cd
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-vm-guixsd"
        - name: RUNC_ENVIRONMENT
          value: guix
