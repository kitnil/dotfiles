apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 90d2ead9e1937e45c3d23efd5e87bec2c251a6d6
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-vm-guixsd"
        - name: RUNC_ENVIRONMENT
          value: guix
