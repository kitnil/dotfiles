apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: b3b709308b289fae0540501eb292594f27f73937
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-pc0"
        - name: RUNC_ENVIRONMENT
          value: guix
