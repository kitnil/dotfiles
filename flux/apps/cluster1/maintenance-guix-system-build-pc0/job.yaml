apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: f359aec74f5201634296491e8576bf82746d4ba1
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-pc0"
        - name: RUNC_ENVIRONMENT
          value: guix
