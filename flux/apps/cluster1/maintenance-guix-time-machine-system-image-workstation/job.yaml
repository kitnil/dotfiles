apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 36179f7b80f7a3965e2d8ebb77637fe99777944d
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
