apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 277886361cc8addc73ddfe1a54ade07f473d006a
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
