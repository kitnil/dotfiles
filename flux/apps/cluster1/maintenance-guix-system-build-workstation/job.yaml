apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 0d2145a16e36d2e3bba961fe2d702740bae6b505
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
