apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 391006f6e67952d30258ae79f084dccf6c5f7d98
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
