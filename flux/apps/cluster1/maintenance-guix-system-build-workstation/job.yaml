apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: f72abd01c4ddbc9f0c36b570d2338697d3837100
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
