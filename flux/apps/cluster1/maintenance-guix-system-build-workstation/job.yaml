apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: bad6cd10cd5c39e09dde6d42d109c263abcb5851
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
