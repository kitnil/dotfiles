apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 1c863cc28ab3a75a5d7ae36a63f4d8169d326f91
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
