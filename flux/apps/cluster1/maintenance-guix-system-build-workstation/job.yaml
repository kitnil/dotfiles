apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 6f0301fd8ded56707cbd40f53a1a3deea1267fd2
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
