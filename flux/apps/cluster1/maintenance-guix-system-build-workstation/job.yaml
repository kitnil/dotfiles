apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: d30e83b3adbedc4b4299d12cf6fe21d1b60f2057
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
