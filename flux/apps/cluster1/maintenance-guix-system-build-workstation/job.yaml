apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: adb4e8c799b0d32954deacf39baa926c9683d672
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
