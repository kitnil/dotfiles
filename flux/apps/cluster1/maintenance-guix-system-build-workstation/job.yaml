apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: a70899b9e025eef2fbf475672eeb253a4fd3e544
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
