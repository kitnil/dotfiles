apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: b93f1fefa140569553ea4d95e69cbc060cd23416
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
