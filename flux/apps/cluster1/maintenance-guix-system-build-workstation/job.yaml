apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: d21e9623cbc5a5ee58ca5b318596cd19e7a2ee7e
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
