apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 3561c6eef25cda0277d247297bf0115069590b34
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
