apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 99b1510880c99394fc18469980fe0b0be0c042df
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
