apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 3e1a231db427e8a415be7627cae2ba8c689f2e5d
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
