apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 55b13643cb29a07b97dd1bae367e5100cb2c43ca
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
