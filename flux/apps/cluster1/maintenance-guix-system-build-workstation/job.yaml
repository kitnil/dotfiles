apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 5d4a037641e4ffea5761358b8737b792a5f6ccc9
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
