apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 1f689773c399dd8579860856b80d6eacf80cb407
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
