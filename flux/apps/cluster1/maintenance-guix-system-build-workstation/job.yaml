apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 7ccbe0142db8c83121cb8944596fcc33ad6addde
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
