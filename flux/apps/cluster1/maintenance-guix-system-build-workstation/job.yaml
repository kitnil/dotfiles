apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 53ce1734cf1cefed142cccd85d0317a9de6101eb
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
        - name: RUNC_ENVIRONMENT
          value: guix
