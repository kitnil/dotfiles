apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 518d791f962ebfe3486a23c3a24d2a8e80aed29c
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
