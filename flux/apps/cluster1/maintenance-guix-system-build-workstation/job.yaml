apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: d9e14569a3189365b62f67efee53146b2e45cfcd
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
