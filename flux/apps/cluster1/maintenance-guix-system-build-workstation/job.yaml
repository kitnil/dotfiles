apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: a80e5e905abbc43b404aafb34c5adfa4013f6074
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
