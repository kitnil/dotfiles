apiVersion: batch/v1
kind: Job
metadata:
  name: guix-system-build
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 7a4c30352acea3f2cb7ca3a33005bb5e25e09c02
        - name: RUNC_MAKE_TARGET
          value: "guix-image-workstation"
