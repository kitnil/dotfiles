apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: fcbe4840b1700adcc6c1436d061612ad3291fa16
        - name: RUNC_MAKE_TARGET
          value: "runc-nix-builder-nixos-rebuild-switch-flake"
        - name: RUNC_CONTAINER_ID
          value: nix-builder
        - name: KUBERNETES_POD_NAME
          value: runc-kube1-nix-builder
        - name: KUBERNETES_NAMESPACE
          value: nix
        - name: RUNC_GUILE
          value: /etc/profiles/per-user/oleg/bin/guile
