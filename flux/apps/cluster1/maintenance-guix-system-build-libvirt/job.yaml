apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 8673fa17748a38a80116551cb3632a137876fcf3
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-libvirt"
        - name: RUNC_ENVIRONMENT
          value: guix
