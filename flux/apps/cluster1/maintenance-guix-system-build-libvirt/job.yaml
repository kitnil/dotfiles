apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 8f21a94ca89969c3de782f2e7745ba187272191e
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-libvirt"
        - name: RUNC_ENVIRONMENT
          value: guix
