apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 16566a2a2a19239bb845bfa4a5d47a25da7ce07a
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-image-libvirt"
        - name: RUNC_ENVIRONMENT
          value: guix
