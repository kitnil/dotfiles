apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: 20b45da8bbc84618e8e4e15ca2aa5d42dfa3ca89
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-image-libvirt"
        - name: RUNC_ENVIRONMENT
          value: guix
