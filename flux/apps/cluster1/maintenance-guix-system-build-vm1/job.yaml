apiVersion: batch/v1
kind: Job
metadata:
  name: invoke-runc
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube1
      containers:
      - name: nsenter
        env:
        - name: GIT_COMMIT
          value: c8fa496e4dab5c92657c28227f9bb87dcad474d2
        - name: RUNC_MAKE_TARGET
          value: "guix-time-machine-system-build-vm1"
        - name: RUNC_ENVIRONMENT
          value: guix
