resources:
  limits:
    cpu: 10m
    memory: 10Mi
  requests:
    cpu: 1m
    memory: 4Mi

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: "ip4"
    support_task_fix_wordpress:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: false
        preferred_ip_protocol: "ip4"
        fail_if_body_not_matches_regexp:
        - '.*Поздравляем.*'
