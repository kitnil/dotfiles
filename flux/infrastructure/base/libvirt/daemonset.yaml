apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: libvirt
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: libvirt
      app.kubernetes.io/part-of: libvirt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: libvirt
        app.kubernetes.io/part-of: libvirt
    spec:
      containers:
      - image: harbor.home.wugi.info/library/libvirt:latest
        name: libvirt
