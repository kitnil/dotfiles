replicas: 1

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchFields:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - kube3

tolerations:
- key: "workstation.cluster.local"
  operator: "Equal"
  value: "true"
  effect: "NoSchedule"

resources:
  limits:
    cpu: 100m
    memory: 300Mi
