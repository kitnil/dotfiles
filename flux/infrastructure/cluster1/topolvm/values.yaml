# CSI controller service
controller:
  # controller.replicaCount -- Number of replicas for CSI controller service.
  replicaCount: 1

# lvmd service
lvmd:
  # lvmd.deviceClasses -- Specify the device-class settings.
  deviceClasses:
  - name: vg0
    volume-group: vg0
    default: true
    spare-gb: 10
  - name: pool0
    volume-group: vg0
    type: thin
    thin-pool:
      name: pool0
      overprovision-ratio: 5.0

  # lvmd.affinity -- Specify affinity.
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topolvm-lvmd.cluster.local/schedulable
            operator: NotIn
            values:
            - "false"
  tolerations:
  - key: workstation.cluster.local
    operator: Equal
    value: 'true'
    effect: NoSchedule
  - key: edge.cluster.local/not-schedulable
    operator: Equal
    effect: NoSchedule

storageClasses:
- name: topolvm-provisioner  # Defines name of storage class.
  storageClass:
    # Supported filesystems are: ext4, xfs, and btrfs.
    fsType: xfs
    # reclaimPolicy
    reclaimPolicy:  # Delete
    # Additional annotations
    annotations: {}
    # Default storage class for dynamic volume provisioning
    # ref: https://kubernetes.io/docs/concepts/storage/dynamic-provisioning
    isDefaultClass: false
    # volumeBindingMode can be either WaitForFirstConsumer or Immediate. WaitForFirstConsumer is recommended because TopoLVM cannot schedule pods wisely if volumeBindingMode is Immediate.
    volumeBindingMode: WaitForFirstConsumer
    # enables CSI drivers to expand volumes. This feature is available for Kubernetes 1.16 and later releases.
    allowVolumeExpansion: true
    additionalParameters: {}
    # "topolvm.io/device-class": "ssd"
    # mount options
    mountOptions: []
  - name: topolvm-provisioner-pool0
    storageClass:
      fsType: xfs
      isDefaultClass: false
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
      additionalParameters:
        '{{ include "topolvm.pluginName" . }}/device-class': "pool0"

node:
  # lvmd.affinity -- Specify affinity.
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topolvm-node.cluster.local/schedulable
            operator: NotIn
            values:
            - "false"
  tolerations:
  - key: workstation.cluster.local
    operator: Equal
    value: 'true'
    effect: NoSchedule
  - key: edge.cluster.local/not-schedulable
    operator: Equal
    effect: NoSchedule
