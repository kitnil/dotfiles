prometheus:
  prometheusSpec:
    # Defines the maximum time that the `prometheus` container's startup probe
    # will wait before being considered failed. The startup probe will return
    # success after the WAL replay is complete. If set, the value should be
    # greater than 60 (seconds). Otherwise it will be equal to 600 seconds (15
    # minutes).
    maximumStartupDurationSeconds: 600

    # Minimum number of seconds for which a newly created Pod should be ready
    # without any of its container crashing for it to be considered available.
    # Defaults to 0 (pod will be considered available as soon as it is ready)
    #
    # This is an alpha field from kubernetes 1.22 until 1.24 which requires
    # enabling the StatefulSetMinReadySeconds feature gate.
    minReadySeconds: 600

    resources:
      limits:
        cpu: 4
        memory: 2Gi
      requests:
        cpu: 1
        memory: 256Mi
    additionalScrapeConfigs:
    - static_configs:
      - targets:
        - 192.168.0.144:9633
      scrape_interval: 10m
      job_name: smartctl
    - static_configs:
      - targets:
        - vm1.wugi.info:9324
        - 192.168.0.160:9324 # container-systemd-nixos-wan
        - 192.168.0.170:9324 # container-systemd-nixos-gw
        - 192.168.0.175:9324 # container-systemd-nixos-zapret
        - 192.168.0.180:9324 # container-systemd-nixos-antifilter
        - 192.168.0.190:9324 # container-systemd-nixos-tor
        - 192.168.0.195:9324 # container-systemd-nixos-workstation-pc0
      scrape_interval: 1m
      job_name: bird
    - static_configs:
      - targets:
        - vm1.wugi.info:9636
      scrape_interval: 1m
      job_name: exim
    - static_configs:
      - targets:
        - vm1.wugi.info:9100
        - vm2.wugi.info:9100
        - notebook.wugi.info:9100
        - openwrt.openwrt:9100
        - vm-guix-datavolume.guix:9100
      scrape_interval: 5s
      job_name: node
    - static_configs:
      - targets:
        - 192.168.0.144:9153
      honor_labels: true
      job_name: dnsmasq
    - static_configs:
      - targets:
        - https://wugi.info/
        - https://guix.wugi.info/
        - https://blog.wugi.info/
        - https://ci.guix.gnu.org
        - https://bordeaux.guix.gnu.org
        - https://substitutes.nonguix.org
        - https://cgit.wugi.info
      scrape_interval: 60m
      metrics_path: /probe
      params:
        module:
        - http_2xx
      relabel_configs:
      - source_labels:
        - __address__
        target_label: __param_target
      - source_labels:
        - __param_target
        target_label: instance
      - replacement: 192.168.0.144:9115
        target_label: __address__
      job_name: http
    - static_configs:
      - targets:
        - 192.168.0.1
        - 81.95.28.27
        - 78.108.80.230
        - 78.108.87.250
        - 78.108.91.250
        - 172.16.103.1
        - ci.guix.gnu.org
      scrape_interval: 30s
      metrics_path: /probe
      params:
        module:
        - icmp
      relabel_configs:
      - source_labels:
        - __address__
        target_label: __param_target
      - source_labels:
        - __param_target
        target_label: instance
      - replacement: 192.168.0.144:9115
        target_label: __address__
      job_name: icmp
    - static_configs:
      - targets:
        - smtp.wugi.info:25
      scrape_interval: 30s
      metrics_path: /probe
      params:
        module:
        - smtp_starttls
      relabel_configs:
      - source_labels:
        - __address__
        target_label: __param_target
      - source_labels:
        - __param_target
        target_label: instance
      - replacement: 192.168.0.144:9115
        target_label: __address__
      job_name: smtps
    - static_configs:
      - targets:
        - imap.wugi.info:143
      scrape_interval: 30s
      metrics_path: /probe
      params:
        module:
        - imap_starttls
      relabel_configs:
      - source_labels:
        - __address__
        target_label: __param_target
      - source_labels:
        - __param_target
        target_label: instance
      - replacement: 192.168.0.144:9115
        target_label: __address__
      job_name: imaps
    - static_configs:
      - targets:
        - 8.8.8.8
      scrape_interval: 10m
      metrics_path: /probe
      params:
        module:
        - dns_udp_mjru_wugi_info
      relabel_configs:
      - source_labels:
        - __address__
        target_label: __param_target
      - source_labels:
        - __param_target
        target_label: instance
      - replacement: 192.168.0.144:9115
        target_label: __address__
      job_name: dns
    - static_configs:
      - targets:
        - 192.168.0.144:9080
      scrape_interval: 5m
      job_name: lvm
    - static_configs:
      - targets:
        - windows.local:9182
        - 192.168.0.178:9182
      scrape_interval: 1m
      job_name: windows
    - static_configs:
      - targets:
        - 192.168.0.144:9095
      honor_labels: true
      job_name: pushgateway
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      acme.cert-manager.io/http01-ingress-class: nginx
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16"
    tls:
    - secretName: prometheus-general-tls
      hosts:
      - prometheus.home.wugi.info
    hosts:
    - prometheus.home.wugi.info

alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      acme.cert-manager.io/http01-ingress-class: nginx
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16"
    tls:
    - secretName: alertmanager-general-tls
      hosts:
      - alertmanager.home.wugi.info
    hosts:
    - alertmanager.home.wugi.info

## Provide custom recording or alerting rules to be deployed into the cluster.
##
additionalPrometheusRulesMap:
  bird:
    groups:
    - rules:
      - labels:
          severity: critical
        expr: absent(sum by (instance,import_filter,proto) (bird_protocol_prefix_import_count{proto="BGP"}))
        for: 1m
        annotations:
          summary: Absent bird imports
          description: Absent bird imports.
        alert: BirdAbsent
      name: bird-exporter
  exim:
    groups:
    - rules:
      - labels:
          severity: critical
        expr: absent(exim_queue)
        for: 1m
        annotations:
          summary: Absent exim queue
          description: Absent exim queue.
        alert: EximAbsent
      - labels:
          severity: warning
        expr: exim_queue != 0
        for: 1h
        annotations:
          summary: Exim non-empty queue
          description: '{{ $value }} messages in exim queue.'
        alert: EximQueue
      name: exim-exporter
  ssh:
    groups:
    - rules:
      - labels:
          severity: warning
        expr: ssh_success != 1
        annotations:
          summary: SSH connection failure
          description: SSH connection failure.
        alert: SshFailure
      name: ssh
  lvm:
    groups:
    - rules:
      - labels:
          severity: critical
        expr: 100 - lvm_lv_data_percent{lv_name="pool0"} < 10
        annotations:
          summary: Logical Thin Volume has less than 10% space left.
          description: Logical Thin Volume {{ $labels.lv_name }} at {{ $labels.instance
            }} has only {{ printf "%.2f" $value }}% available space left.
        alert: LvmLvDataAlmostOutOfSpace
      - labels:
          severity: critical
        for: 10m
        expr: absent(lvm_lv_data_percent{lv_name="pool0"})
        annotations:
          summary: Absent metrics for Logical Thin Volume.
          description: Absent metrics for Logical Thin Volume at {{ $labels.instance
            }}.
        alert: LvmLvDataPercentAbsent
      name: lvm
  smartctl:
    groups:
    - rules:
      - labels:
          severity: critical
        expr: absent(smartctl_device_attribute{attribute_id="5", attribute_value_type="raw"})
        for: 20m
        annotations:
          summary: Absent smartctl reallocated sectors counts
          description: Absent smartctl reallocated sectors counts.
        alert: DiskAbsentReallocatedSectors
      - labels:
          severity: critical
        expr: deriv(smartctl_device_attribute{attribute_id="5",attribute_value_type="raw"}[15m])
          > 0
        annotations:
          summary: Reallocated sectors detected.
          description: Disk {{ $labels.model_name }} has {{ $value }} reallocated
            sectors.
        alert: DiskReallocatedSectors
      name: smartctl-exporter
  windows:
    groups:
    - rules:
      - labels:
          severity: warning
        for: 1m
        expr: windows_exporter_collector_success != 1
        annotations:
          summary: Windows exporter collector {{ $labels.collector }} failed (instance
            {{ $labels.instance }})
        alert: WindowsCollectorFail
      - labels:
          severity: warning
        for: 1h
        expr: windows_logical_disk_free_bytes / windows_logical_disk_size_bytes *
          100 < 5
        annotations:
          summary: Filesystem has less than 5% space left.
          description: Filesystem on {{ $labels.volume }} at {{ $labels.instance }}
            has only {{ printf "%.2f" $value }}% available space left.
        alert: WindowsFilesystemAlmostOutOfSpace
      name: windows-exporter

grafana:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      acme.cert-manager.io/http01-ingress-class: nginx
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16"
    tls:
    - secretName: grafana-general-tls
      hosts:
      - grafana.home.wugi.info
    hosts:
    - grafana.home.wugi.info

prometheus-node-exporter:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: prometheus-node-exporter.cluster.local/schedulable
            operator: NotIn
            values:
            - "false"
          - key: kubernetes.io/os
            operator: NotIn
            values:
            - "windows"

