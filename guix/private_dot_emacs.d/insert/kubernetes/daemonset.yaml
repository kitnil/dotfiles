apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: $1
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: $1
      app.kubernetes.io/part-of: $2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: $1
        app.kubernetes.io/part-of: $2
    spec:
      containers:
      - image: $1:latest
        name: $1
