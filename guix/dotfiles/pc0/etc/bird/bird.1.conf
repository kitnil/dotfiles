log "/var/log/bird.log" all;

define OWNAS = 64991;
define OWNIP = 192.168.0.192;
define OWNNET = 192.168.0.0/24;
define OWNNETSET = [192.168.0.0/24+];

router id OWNIP;

protocol device {
    scan time 10;
}

protocol static {
    ipv4 {
        import all;
        export all;
    };
}

protocol static {
    ipv4;
    route 0.0.0.0/0 via 192.168.0.1;
}

include "/etc/bird/peers/*.conf";
