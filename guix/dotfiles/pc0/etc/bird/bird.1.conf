log "/var/log/bird.log" all;

define OWNAS = 64980;
define OWNIP = 192.168.0.192;

router id OWNIP;

protocol device {
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4 {
        import all;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "br0";
    route 192.168.0.0/32 blackhole;
}

include "/etc/bird/peers/*.conf";
