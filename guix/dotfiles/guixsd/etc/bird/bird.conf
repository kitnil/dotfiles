log "/var/log/bird.log" all;

define OWNAS = 64977;

protocol device {
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "br0";
    route 0.0.0.0/0 recursive 192.168.0.1;
}

include "/etc/bird/peers/*.conf";
