log "/var/log/bird.log" all;

define OWNAS = 64974;
define OWNIP = 192.168.0.194;

router id OWNIP;

protocol device {
}

protocol kernel {
    learn;
    ipv4 {
        import none;
        export all;
    };
}

protocol static {
    ipv4 {
        import all;
        export all;
    };
}

protocol static {
    ipv4;
    route 192.168.0.0/24 via "eth0";
}

include "/etc/bird/peers/*.conf";
