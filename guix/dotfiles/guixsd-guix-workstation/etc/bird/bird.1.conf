log "/var/log/bird.log" all;

################################################
#               Variable header                #
################################################

define OWNAS = 64994;
define OWNIP = 192.168.0.191;

################################################
#                 Header end                   #
################################################

router id OWNIP;

protocol device {
    scan time 10;
}

/*
 *  Utility functions
 */

protocol kernel {
    scan time 20;

    ipv4 {
        import all;
        export all;
    };
}

protocol static {
    ipv4 {
        import all;
        export all;
    };
}

protocol static {
ipv4;
route 192.168.0.0/24 via "br0";

route 23.35.105.25/32 via 192.168.25.1;
route 23.35.105.98/32 via 192.168.25.1;
route 140.174.177.7/32 via 192.168.25.1;
route 140.174.177.9/32 via 192.168.25.1;
route 141.80.181.40/32 via 192.168.25.1;
route 144.76.7.123/32 via 192.168.25.1;
}

template bgp dnpeers {
    local as OWNAS;
    path metric 1;
    ipv4 {
        next hop self;
        import none;
        export all;
    };
}

include "/etc/bird/peers/*";
